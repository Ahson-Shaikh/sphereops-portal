server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Enable gzip compression for text assets.
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache-busted static assets can be cached for a long time.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Keep HTML fresh so new deployments are picked up.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
